spring.application.name=API-GATEWAY
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.discovery.locator.enabled=false

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.routes[1].id=employee-service
spring.cloud.gateway.routes[1].uri=lb://EMPLOYEE-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/employees/**

spring.cloud.gateway.routes[2].id=attendance-service
spring.cloud.gateway.routes[2].uri=lb://ATTENDANCE-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/attendance/**

spring.cloud.gateway.routes[3].id=leave-service
spring.cloud.gateway.routes[3].uri=lb://LEAVE-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/leaves/**

# JWT
jwt.secret=hrms-super-secure-secret-key-1234567890-abcdef

eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost